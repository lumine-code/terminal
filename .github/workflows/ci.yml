name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks on ${{ matrix.os }} (Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 24
          - os: windows-latest
            node: 24
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # `--ignore-scripts` skips building the native `node-pty`, which lint,
      # formatting, and packing don't need and which is fragile to compile on
      # the hosted runners. It is rebuilt for Electron inside the editor.
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
      - name: Verify package contents
        run: npm pack --dry-run

  integration:
    # Run the whole Jasmine spec suite inside a real Lumine build. The specs use
    # the editor runtime (the workspace, config, xterm) and mock the PTY, so
    # this is the single place they run in CI now that there is no `npm test`.
    name: Lumine integration specs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ATOM_JASMINE_REPORTER: list
    steps:
      - uses: actions/checkout@v6
        with:
          path: terminal
      - uses: actions/checkout@v6
        with:
          repository: lumine-code/lumine
          path: lumine
      - uses: actions/setup-node@v6
        with:
          node-version-file: lumine/.nvmrc
          cache: yarn
          cache-dependency-path: lumine/yarn.lock
      - name: Install Linux build and headless-display dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-dev libxkbfile-dev libsecret-1-dev
      # The specs stub `Pty.prototype.spawn`, so the native `node-pty` is never
      # loaded; skip its build with `--ignore-scripts`.
      - name: Install package dependencies
        working-directory: terminal
        run: npm ci --ignore-scripts
      # Mirrors the editor's own CI: install without scripts (patch-package and
      # some native install scripts misbehave; native modules are rebuilt for
      # Electron below), then reproduce the pieces that matter. Serialized
      # network access with retries absorbs flaky git-hosted fork downloads.
      - name: Install editor dependencies
        working-directory: lumine
        run: |
          install() { yarn install --frozen-lockfile --ignore-scripts --network-concurrency 1; }
          install || install || install
      - name: Apply patches
        working-directory: lumine
        run: npx patch-package
      - name: Download the Electron binary
        working-directory: lumine
        run: node ./node_modules/electron/install.js
      - name: Rebuild native modules for Electron
        working-directory: lumine
        run: yarn build
      - name: Run the Jasmine spec suite
        working-directory: lumine
        timeout-minutes: 20
        run: xvfb-run --auto-servernum yarn start --test ../terminal/spec
